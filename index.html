<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Top 100 EmpCode Leaderboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { 
            background-color: #f0f2f5; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            padding-bottom: 50px;
        }
        .main-container { 
            background: #ffffff; 
            padding: 40px 30px; 
            border-radius: 16px; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.05); 
            margin-top: 40px; 
            max-width: 900px; 
        }
        .header-section { 
            background: linear-gradient(135deg, #0d6efd, #0dcaf0);
            color: white;
            padding: 30px;
            border-radius: 12px;
            text-align: center; 
            margin-bottom: 30px; 
            box-shadow: 0 4px 10px rgba(13, 110, 253, 0.2);
        }
        .header-section h2 { font-weight: bold; margin-bottom: 5px; }
        .header-section p { margin-bottom: 0; opacity: 0.9; }
        
        /* ตกแต่งตาราง */
        .table-wrapper {
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 0 10px rgba(0,0,0,0.02);
            border: 1px solid #e9ecef;
        }
        .table { margin-bottom: 0; }
        .table thead { background-color: #f8f9fa; color: #495057; font-weight: bold; }
        .table th { border-bottom-width: 2px; }
        .table tbody tr:hover { background-color: #f1f4f9; transition: background-color 0.2s ease; }
        .rank-badge {
            background-color: #ffc107;
            color: #000;
            font-weight: bold;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .rank-normal {
            background-color: #e9ecef;
            color: #6c757d;
        }
    </style>
</head>
<body>
    <div class="container main-container">
        <div class="header-section">
            <h2>🏆 Top 100 StepCount</h2>
            <p>ลีดเดอร์บอร์ดจัดอันดับผู้ที่มียอดเดินรวมสูงสุด</p>
        </div>

        <div id="loader" class="text-center my-5">
            <div class="spinner-border text-primary" role="status" style="width: 3rem; height: 3rem;">
                <span class="visually-hidden">Loading...</span>
            </div>
            <p class="mt-3 text-muted fw-bold">กำลังดึงข้อมูลและประมวลผล...</p>
        </div>

        <div id="error-message" class="alert alert-danger" style="display: none;"></div>

        <div id="content" style="display: none;">
            
            <div class="row mb-4 justify-content-end">
                <div class="col-md-5">
                    <div class="input-group">
                        <span class="input-group-text bg-white">🔍</span>
                        <input type="text" id="searchInput" class="form-control" placeholder="ค้นหาด้วยรหัสพนักงาน (EmpCode)...">
                    </div>
                </div>
            </div>

            <div class="table-wrapper">
                <table class="table">
                    <thead>
                        <tr>
                            <th class="text-center" style="width: 15%;">อันดับ</th>
                            <th>รหัสพนักงาน (EmpCode)</th>
                            <th class="text-end" style="width: 35%;">ยอดรวมก้าว (Total Steps)</th>
                        </tr>
                    </thead>
                    <tbody id="table-body">
                        </tbody>
                </table>
            </div>
            
            <div id="no-result" class="text-center text-muted mt-4" style="display: none;">
                <p>ไม่พบรหัสพนักงานที่ค้นหาใน 100 อันดับแรก</p>
            </div>
        </div>
    </div>

    <script>
        const apiUrl = 'https://www.servicesrx.com/apirunninghr/EmpStepData.asmx/GetAllData';
        
        // สร้างตัวแปรเก็บข้อมูล 100 อันดับแรกไว้ (เพื่อให้ค้นหาได้โดยไม่ต้องดึง API ใหม่)
        let globalTop100Data = [];

        async function fetchAndProcessData() {
            try {
                // ดึงข้อมูล
                const response = await fetch(apiUrl, {
                    method: 'GET',
                    headers: { 'Accept': 'text/xml, application/xml, */*' }
                });

                if (!response.ok) throw new Error(`HTTP error! Status: ${response.status}`);

                const xmlText = await response.text();
                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(xmlText, "text/xml");

                if (xmlDoc.getElementsByTagName("parsererror").length > 0) {
                    throw new Error("เกิดข้อผิดพลาดในการอ่านโครงสร้าง XML");
                }

                const records = xmlDoc.querySelectorAll('*|StepDataRecord, StepDataRecord');
                if (records.length === 0) throw new Error("ไม่พบข้อมูล StepDataRecord ในระบบ");

                // รวมยอด StepCount
                const summaryMap = {};
                records.forEach(record => {
                    const empCodeNode = record.querySelector('*|EmpCode, EmpCode');
                    const stepCountNode = record.querySelector('*|StepCount, StepCount');
                    
                    const empCode = empCodeNode ? empCodeNode.textContent.trim() : null;
                    const stepCount = stepCountNode ? parseInt(stepCountNode.textContent, 10) : 0;

                    if (empCode) {
                        if (summaryMap[empCode]) {
                            summaryMap[empCode] += stepCount;
                        } else {
                            summaryMap[empCode] = stepCount;
                        }
                    }
                });

                // แปลงและจัดเรียงข้อมูล
                const sortedData = Object.keys(summaryMap).map(empCode => {
                    return { empCode: empCode, totalSteps: summaryMap[empCode] };
                });

                sortedData.sort((a, b) => b.totalSteps - a.totalSteps);
                
                // เก็บข้อมูล Top 100 ไว้ในตัวแปร Global
                globalTop100Data = sortedData.slice(0, 100);

                // นำไปแสดงผล
                renderTable(globalTop100Data);

            } catch (error) {
                showError(`<strong>เกิดข้อผิดพลาด:</strong> ${error.message}`);
            }
        }

        // ฟังก์ชันวาดตาราง (รับข้อมูลที่กรองแล้วมาแสดง)
        function renderTable(data) {
            const tableBody = document.getElementById('table-body');
            const loader = document.getElementById('loader');
            const content = document.getElementById('content');
            const noResult = document.getElementById('no-result');

            tableBody.innerHTML = ''; 

            if (data.length > 0) {
                noResult.style.display = 'none';
                data.forEach((item, index) => {
                    // หากเป็น 3 อันดับแรก จะให้ป้ายอันดับเป็นสีทอง นอกนั้นเป็นสีเทา
                    // ข้อสังเกต: เวลาค้นหา index จะเริ่มใหม่ เราต้องการให้อันดับยังคงเป็นอันดับที่แท้จริง
                    // จึงต้องไปหา Index จริงจาก globalTop100Data
                    const realRank = globalTop100Data.findIndex(x => x.empCode === item.empCode) + 1;
                    const badgeClass = realRank <= 3 ? 'rank-badge' : 'rank-badge rank-normal';

                    const rowHTML = `
                        <tr>
                            <td class="text-center">
                                <span class="${badgeClass}">${realRank}</span>
                            </td>
                            <td class="align-middle fw-bold text-primary">${item.empCode}</td>
                            <td class="text-end align-middle fw-semibold">${item.totalSteps.toLocaleString()}</td>
                        </tr>
                    `;
                    tableBody.insertAdjacentHTML('beforeend', rowHTML);
                });
            } else {
                noResult.style.display = 'block';
            }

            loader.style.display = 'none';
            content.style.display = 'block';
        }

        function showError(messageHtml) {
            const loader = document.getElementById('loader');
            const errorDiv = document.getElementById('error-message');
            loader.style.display = 'none';
            errorDiv.innerHTML = messageHtml;
            errorDiv.style.display = 'block';
        }

        // --- ระบบค้นหา (Search) ---
        document.getElementById('searchInput').addEventListener('input', function(e) {
            const keyword = e.target.value.trim().toLowerCase();
            
            // กรองข้อมูลจาก Array สู่ Array ใหม่
            const filteredData = globalTop100Data.filter(item => {
                return item.empCode.toLowerCase().includes(keyword);
            });

            // สั่งให้วาดตารางใหม่ด้วยข้อมูลที่กรองแล้ว
            renderTable(filteredData);
        });

        // สั่งให้ทำงานเมื่อเปิดเว็บ
        window.addEventListener('DOMContentLoaded', fetchAndProcessData);
    </script>
</body>
</html>
