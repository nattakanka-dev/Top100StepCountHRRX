<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Top 100 EmpCode Leaderboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; padding: 20px; font-family: sans-serif; }
        .container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-top: 20px; max-width: 900px; }
        .header-section { text-align: center; margin-bottom: 30px; }
        .table thead { background-color: #0d6efd; color: white; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-section">
            <h2>🏆 Top 100 EmpCode Leaderboard</h2>
            <p class="text-muted">จัดอันดับผู้ที่มียอด StepCount รวมสูงสุด</p>
        </div>

        <div id="loader" class="text-center my-5">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
            <p class="mt-2 text-muted">กำลังดึงข้อมูลและประมวลผล...</p>
        </div>

        <div id="error-message" class="alert alert-danger" style="display: none;"></div>

        <div id="content" style="display: none;">
            <table class="table table-hover table-bordered">
                <thead>
                    <tr>
                        <th class="text-center" style="width: 15%;">อันดับ</th>
                        <th>รหัสพนักงาน (EmpCode)</th>
                        <th class="text-end">ยอดรวมก้าว (Total StepCount)</th>
                    </tr>
                </thead>
                <tbody id="table-body">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        // 1. กำหนด URL ของ API
        const apiUrl = 'https://www.servicesrx.com/apirunninghr/EmpStepData.asmx/GetAllData';

        // 2. ฟังก์ชันหลักสำหรับดึงและประมวลผลข้อมูล
        async function fetchAndProcessData() {
            try {
                // ดึงข้อมูลผ่าน Network
                const response = await fetch(apiUrl, {
                    method: 'GET',
                    headers: {
                        'Accept': 'text/xml, application/xml, */*'
                    }
                });

                // ตรวจสอบว่าเชื่อมต่อสำเร็จหรือไม่
                if (!response.ok) {
                    throw new Error(`HTTP error! Status: ${response.status}`);
                }

                // แปลงผลลัพธ์ที่ได้เป็นตัวอักษร
                const xmlText = await response.text();

                // 3. ใช้ DOMParser เพื่อแปลงตัวอักษรเป็นโครงสร้าง XML
                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(xmlText, "text/xml");

                // ตรวจสอบ Error จากการแปลง XML
                if (xmlDoc.getElementsByTagName("parsererror").length > 0) {
                    throw new Error("เกิดข้อผิดพลาดในการอ่านโครงสร้าง XML");
                }

                // 4. ค้นหาข้อมูล (รองรับการค้นหาแบบมี Namespace และไม่มี)
                const records = xmlDoc.querySelectorAll('*|StepDataRecord, StepDataRecord');
                
                if (records.length === 0) {
                    throw new Error("ไม่พบข้อมูล StepDataRecord ในระบบ");
                }

                // 5. รวมผลยอด StepCount ตาม EmpCode
                const summaryMap = {};
                
                records.forEach(record => {
                    const empCodeNode = record.querySelector('*|EmpCode, EmpCode');
                    const stepCountNode = record.querySelector('*|StepCount, StepCount');
                    
                    const empCode = empCodeNode ? empCodeNode.textContent : null;
                    // แปลงข้อความเป็นตัวเลขฐาน 10
                    const stepCount = stepCountNode ? parseInt(stepCountNode.textContent, 10) : 0;

                    if (empCode) {
                        if (summaryMap[empCode]) {
                            summaryMap[empCode] += stepCount;
                        } else {
                            summaryMap[empCode] = stepCount;
                        }
                    }
                });

                // 6. แปลง Object เป็น Array เพื่อให้เรียงลำดับได้
                const sortedData = Object.keys(summaryMap).map(empCode => {
                    return { empCode: empCode, totalSteps: summaryMap[empCode] };
                });

                // เรียงจากมากไปน้อย (Descending)
                sortedData.sort((a, b) => b.totalSteps - a.totalSteps);
                
                // เอาแค่ 100 อันดับแรก
                const top100 = sortedData.slice(0, 100);

                // 7. ส่งข้อมูลไปวาดลงตาราง
                renderTable(top100);

            } catch (error) {
                // หากเกิดข้อผิดพลาด ให้แสดงแจ้งเตือน (พร้อมคำแนะนำเรื่อง CORS)
                showError(`
                    <strong>เกิดข้อผิดพลาด:</strong> ${error.message} <br><br>
                    <small>
                        💡 <strong>คำแนะนำ:</strong> หากข้อความ Error เกี่ยวข้องกับคำว่า "Failed to fetch" หรือแสดงผลไม่ออก อาจเป็นเพราะ <strong>CORS Policy</strong> เบราว์เซอร์ไม่อนุญาตให้ดึงข้อมูลข้ามโดเมน คุณอาจจะต้องตั้งค่าฝั่ง C# Backend เพื่อเพิ่ม Header: <code>Access-Control-Allow-Origin: *</code>
                    </small>
                `);
            }
        }

        // 8. ฟังก์ชันสำหรับวาดข้อมูลลงในตาราง HTML
        function renderTable(data) {
            const tableBody = document.getElementById('table-body');
            const loader = document.getElementById('loader');
            const content = document.getElementById('content');

            tableBody.innerHTML = ''; // ล้างข้อมูลเก่าออกก่อน

            if (data.length > 0) {
                data.forEach((item, index) => {
                    const rowHTML = `
                        <tr>
                            <td class="text-center">${index + 1}</td>
                            <td><strong>${item.empCode}</strong></td>
                            <td class="text-end">${item.totalSteps.toLocaleString()}</td>
                        </tr>
                    `;
                    // ใส่ข้อมูลต่อท้ายไปเรื่อยๆ
                    tableBody.insertAdjacentHTML('beforeend', rowHTML);
                });
            } else {
                tableBody.innerHTML = '<tr><td colspan="3" class="text-center text-muted">ไม่มีข้อมูลที่จะแสดง</td></tr>';
            }

            // ซ่อนที่หมุนๆ และโชว์ตาราง
            loader.style.display = 'none';
            content.style.display = 'block';
        }

        // 9. ฟังก์ชันสำหรับแสดงกล่อง Error
        function showError(messageHtml) {
            const loader = document.getElementById('loader');
            const errorDiv = document.getElementById('error-message');
            
            loader.style.display = 'none';
            errorDiv.innerHTML = messageHtml;
            errorDiv.style.display = 'block';
        }

        // 10. สั่งให้ทำงานเมื่อหน้าเว็บโหลดโครงสร้างเสร็จแล้ว
        window.addEventListener('DOMContentLoaded', fetchAndProcessData);
    </script>
</body>
</html>
